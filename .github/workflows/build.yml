name: Build APK

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            PRERELEASE="false"
            TAG_NAME="${VERSION}"
          else
            VERSION="${SHORT_SHA}"
            PRERELEASE="true"
            TAG_NAME="pre-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "prerelease=${PRERELEASE}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > /tmp/release.keystore

      - name: Build release APK
        env:
          SIGNING_KEYSTORE_PATH: /tmp/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: gradle :app:assembleRelease --stacktrace

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/kv-apk-${{ steps.version.outputs.version }}.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: app/build/outputs/apk/release/kv-apk-${{ steps.version.outputs.version }}.apk
